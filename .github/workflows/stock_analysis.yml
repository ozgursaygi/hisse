name: 1-Hour Stock Analysis

on:
  schedule:
    - cron: '0 * * * *' # Her 1 saatte bir çalıştır
  workflow_dispatch: # İstediğiniz zaman manuel tetikleyebilmeniz için buton ekler

permissions:
  contents: write # Repoya dosyayı geri yazabilmesi için izin

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance scikit-learn matplotlib requests

      - name: Run Stock Analysis Script
        run: python iMultiStock_v25.py

      - name: Commit and Push Generated HTML
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Otomatik Güncelleme: MultiStock_v25.html (Saatlik)"
          file_pattern: 'MultiStock_v25.html'